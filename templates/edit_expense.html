<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }

        .edit-card {
            max-width: 700px;
            margin: 60px auto;
            padding: 30px;
            border-radius: 15px;
            background: linear-gradient(145deg, #1c1c1c, #111);
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
        }

        .form-control {
            background-color: #2b2b2b;
            border: none;
            color: white;
        }

        .form-control:focus {
            background-color: #2b2b2b;
            color: white;
            box-shadow: none;
            border: 1px solid #28a745;
        }

        .btn-update {
            background-color: #28a745;
            border: none;
        }

        .btn-update:hover {
            background-color: #218838;
        }

        .btn-cancel {
            background-color: #6c757d;
            border: none;
        }

        label {
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="edit-card">
    <h2>Edit Expense</h2>

    <form method="POST">

        <label>Amount</label>
        <input type="number" name="amount" class="form-control"
               value="{{ expense.amount }}" required>

        <label>Category</label>
        <input type="text" name="category" class="form-control"
               value="{{ expense.category }}" required>

        <label>Date</label>
        <input type="date" name="date" class="form-control"
               value="{{ expense.date_spent.strftime('%Y-%m-%d') }}" required>

        <!-- Feedback section -->
        <label>How do you feel about this expense?</label><br>

        <input type="radio" name="regret" value="0"
            {% if expense.regret == 0 %}checked{% endif %}>
        Worth it

        <br>

        <input type="radio" name="regret" value="1"
            {% if expense.regret == 1 %}checked{% endif %}>
        I regret this spending

        <br><br>

        <button type="submit" class="btn btn-update">Update Expense</button>
        <a href="{{ url_for('view_data.view_data') }}"
           class="btn btn-cancel">Cancel</a>

    </form>
</div>

</body>
</html>
