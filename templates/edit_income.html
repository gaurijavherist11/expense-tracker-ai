<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Income</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background-color:#0f0f0f;
            color:white;
            font-family: Arial, Helvetica, sans-serif;
        }
        .form-container{
            max-width:800px;
            margin:60px auto;
            padding:40px;
            background:#1b1b1b;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.6);
        }
        .form-control{
            background:#2a2a2a;
            border:none;
            color:white;
        }
        .form-control:focus{
            background:#2a2a2a;
            color:white;
            box-shadow:none;
        }
        label{
            margin-top:15px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Edit Income</h2>

    <form method="POST">
        <label>Amount</label>
        <input type="number" name="amount" class="form-control" value="{{ income.amount }}" required>

        <label>Source</label>
        <input type="text" name="source" class="form-control" value="{{ income.source }}" required>

        <label>Date</label>
        <input type="date" name="date" class="form-control"
               value="{{ income.date_received.strftime('%Y-%m-%d') }}" required>

        <br>
        <button type="submit" class="btn btn-success">Update Income</button>
        <a href="{{ url_for('view_data.view_data') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

</body>
</html>
